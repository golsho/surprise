<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>suprise</title>
    <style>
      body {
        margin: 0;
        background: #000;
      }

      .reveal {
        visibility: hidden;
      }

      .reveal.is-ready {
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <section>
          <section class="intro-slide">
            <div>
              <p>Scroll down to begin</p>
            </div>
          </section>

          <section class="image-slide">
            <img src="/strip/image_1.webp" alt="Strip image 1" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_2.webp" alt="Strip image 2" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_3.webp" alt="Strip image 3" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_4.webp" alt="Strip image 4" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_5.webp" alt="Strip image 5" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_6.webp" alt="Strip image 6" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_7.webp" alt="Strip image 7" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_8.webp" alt="Strip image 8" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_9.webp" alt="Strip image 9" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_10.webp" alt="Strip image 10" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_11.webp" alt="Strip image 11" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_12.webp" alt="Strip image 12" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_13.webp" alt="Strip image 13" />
          </section>

          <section class="image-slide">
            <img src="/strip/image_14.webp" alt="Strip image 14" />
          </section>

          <section class="collage-slide">
            <div
              class="collage-board"
              aria-label="Some of our favourite moments together"
            >
              <figure class="photo-card photo-card--one">
                <img
                  src="/pictures/1B14BC57-4047-4A2E-8FEC-4ADE2FF9D6B6.webp"
                  alt="A moment together in the car"
                />
              </figure>
              <figure class="photo-card photo-card--two">
                <img
                  src="/pictures/E403D09B-9F8E-451C-BD7C-9A959203A308.webp"
                  alt="A sunny moment together"
                />
              </figure>
              <figure class="photo-card photo-card--three">
                <img
                  src="/pictures/994F8E71-F246-4D2A-955E-C3EF3F13F8A6.webp"
                  alt="A portrait from a day out"
                />
              </figure>
              <figure class="photo-card photo-card--four">
                <img
                  src="/pictures/44AD4E9B-8CAF-4995-AE96-D737C9222B3C.webp"
                  alt="Standing together outdoors"
                />
              </figure>
              <figure class="photo-card photo-card--five">
                <img
                  src="/pictures/B3C46762-A06D-4102-A1C6-606C4D34099E.webp"
                  alt="A mountain view together"
                />
              </figure>
              <figure class="photo-card photo-card--six">
                <img
                  src="/pictures/C4781F05-BFD8-442D-96F7-A67FFD9E0B68.webp"
                  alt="Sitting together on a train"
                />
              </figure>
              <figure class="photo-card photo-card--seven">
                <img
                  src="/pictures/EF95954A-CE72-4677-A0A7-F04E0F9C8AEF.webp"
                  alt="A close-up moment together"
                />
              </figure>
              <figure class="photo-card photo-card--eight">
                <img
                  src="/pictures/F98C99A1-98BF-4E89-8E93-E5ADCD317004_4_5005_c.webp"
                  alt="A happy day together"
                />
              </figure>
            </div>
            <p>some of my favourite moments with you</p>
          </section>

          <section class="birthday-slide">
            <canvas class="confetti" aria-hidden="true"></canvas>
            <div>
              <h1>Happy birthday Areen,</h1>
              <p>
                I hope you will have an amazing day because you deserve it
                <span aria-label="love">❤️</span>
              </p>
            </div>
          </section>
        </section>
      </div>
      <div class="scroll-cue" aria-hidden="true">V</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
